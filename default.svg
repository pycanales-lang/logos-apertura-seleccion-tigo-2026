<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" width="120" height="130">
  <!-- Escudo Selección Tigo — Logo por defecto -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#001eb4"/>
      <stop offset="100%" stop-color="#00025a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Forma del escudo -->
  <path d="M60 4 L108 22 L108 72 Q108 108 60 126 Q12 108 12 72 L12 22 Z"
        fill="url(#bg)" stroke="#43c8f5" stroke-width="2.5"/>

  <!-- Brillo superior -->
  <path d="M60 8 L104 24 L104 60 Q80 40 60 36 Q40 40 16 60 L16 24 Z"
        fill="url(#shine)"/>

  <!-- Línea horizontal central decorativa -->
  <line x1="20" y1="65" x2="100" y2="65" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Pelota de fútbol (simplificada) -->
  <circle cx="60" cy="58" r="22" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <circle cx="60" cy="58" r="10" fill="rgba(255,255,255,0.12)"/>
  <text x="60" y="63" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.9)">⚽</text>

  <!-- Texto ST -->
  <text x="60" y="96" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="900"
        fill="#43c8f5" letter-spacing="3">ST</text>

  <!-- Texto inferior -->
  <text x="60" y="112" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="7" font-weight="600"
        fill="rgba(255,255,255,0.5)" letter-spacing="1.5">SELECCIÓN TIGO</text>
</svg>
